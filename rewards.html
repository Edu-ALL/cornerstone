<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUALL - Best Panel Speaker</title>

    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Konfigurasi Tailwind Custom -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'monospace'],
                        body: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brandBlue: '#0f4c81',
                        skyLight: '#e0f2fe',
                        gold: '#d4af37',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            filter: blur(20px);
            z-index: 0;
        }

        .slide-container {
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        /* Animasi loading dots sudah dihapus sesuai permintaan */
    </style>
</head>

<body class="h-screen w-screen relative text-slate-800">
    <!-- Pastikan path gambar ini benar di folder Anda -->
    <img src="img/BEST CATEGORY BACKGROUND.png" class="w-full h-full object-cover absolute left-0 top-0 z-0">

    <!-- Header / Logo Area -->
    <header
        class="absolute top-0 left-0 w-full p-8 flex justify-between items-center z-20 uppercase tracking-widest font-bold text-sm md:text-base text-slate-700 -mt-5">
        <div>
            <img src="img/LOGO/Logo EduALL 2026@4x.png" alt="EduALL" class="w-[120px]">
        </div>
        <div>
            <img src="img/LOGO/GKL15_Yayasan_Indonesia_Mengajar.png" alt="Indonesia Mengajar" class="w-[200px]">
        </div>
    </header>

    <!-- Wrapper Utama Slider -->
    <main class="relative z-10 h-full w-full overflow-hidden flex flex-col justify-center items-center">

        <!-- Container Slide (Bergerak Horizontal) -->
        <div id="slider-track" class="slide-container flex h-full w-full">

            <!-- SLIDE 1: Best Opening Speaker -->
            <div class="w-full h-full flex-shrink-0 flex flex-col justify-center items-center text-center px-4">
                <h1 class="text-2xl md:text-5xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp;
                        E</span>
                    <br>CORNERSTONE
                </h1>

                <h2
                    class="text-3xl md:text-5xl lg:text-7xl font-semibold mt-4 text-blue-900 mb-6 leading-tight tracking-tight uppercase">
                    best opening speaker
                </h2>

                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <!-- Kosongkan teks awal, tidak ada loading dots -->
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl text-slate-900" id="bestOpening"></h1>
                </div>
            </div>

            <!-- SLIDE 2: Best Panel Speaker -->
            <div
                class="w-full h-full flex-shrink-0 flex flex-col justify-center items-center text-center px-4 opacity-90">
                <h1 class="text-2xl md:text-5xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp;
                        E</span>
                    <br>CORNERSTONE
                </h1>
                <h2
                    class="text-3xl md:text-5xl lg:text-7xl font-semibold mt-4 text-blue-900 mb-6 leading-tight tracking-tight uppercase">
                    best panel speaker
                </h2>
                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <!-- Kosongkan teks awal, tidak ada loading dots -->
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl text-slate-900" id="bestPanel"></h1>
                </div>
            </div>

            <!-- SLIDE 3: Best Project Exhibitor -->
            <div
                class="w-full h-full flex-shrink-0 flex flex-col justify-center items-center text-center px-4 opacity-90">
                <h1 class="text-2xl md:text-5xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp;
                        E</span>
                    <br>CORNERSTONE
                </h1>
                <h2
                    class="text-3xl md:text-5xl lg:text-7xl font-semibold mt-4 text-blue-900 mb-6 leading-tight tracking-tight uppercase">
                    best project exhibitor
                </h2>
                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <!-- Kosongkan teks awal, tidak ada loading dots -->
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl text-slate-900" id="bestProject"></h1>
                </div>
            </div>

        </div>
    </main>

    <!-- Kontrol Navigasi Slider -->
    <div class="absolute bottom-10 left-0 w-full flex justify-center items-center gap-6 z-30">
        <button onclick="moveSlide(-1)"
            class="p-3 rounded-full bg-white/50 hover:bg-white hover:shadow-lg transition-all text-blue-900 backdrop-blur-sm group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>

        <div class="flex gap-2">
            <button onclick="goToSlide(0)"
                class="dot w-3 h-3 rounded-full bg-blue-900 transition-all duration-300"></button>
            <button onclick="goToSlide(1)"
                class="dot w-3 h-3 rounded-full bg-blue-900/30 hover:bg-blue-900/50 transition-all duration-300"></button>
            <button onclick="goToSlide(2)"
                class="dot w-3 h-3 rounded-full bg-blue-900/30 hover:bg-blue-900/50 transition-all duration-300"></button>
        </div>

        <button onclick="moveSlide(1)"
            class="p-3 rounded-full bg-white/50 hover:bg-white hover:shadow-lg transition-all text-blue-900 backdrop-blur-sm group">
            <svg class="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
    </div>

    <!-- JavaScript Logika Slider & Fetch Data -->
    <script>
        // ==========================================
        // URL GOOGLE APPS SCRIPT (Dari input Anda)
        // ==========================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyv4urCD3PhKTW-wcy2Z5GLoeWBItWTOJrdssIaJPus_UtdmtMLUvrUok-eMouAL6Ys/exec?type=rewards';

        let currentIndex = 0;
        const totalSlides = 3;
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');

        // --- FUNGSI AMBIL DATA DARI GOOGLE SHEETS ---
        async function fetchData() {
            try {
                // Fetch data ke Apps Script
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();

                // Update nama di HTML (Hanya jika data ada dan valid)
                if(data.bestOpening) document.getElementById('bestOpening').innerText = data.bestOpening;
                if(data.bestPanel) document.getElementById('bestPanel').innerText = data.bestPanel;
                if(data.bestProject) document.getElementById('bestProject').innerText = data.bestProject;
                
                console.log("Data diperbarui:", data);

            } catch (error) {
                console.error("Gagal mengambil data:", error);
                // Jangan ubah text menjadi "Not Found", biarkan tetap nama terakhir yang sukses atau kosong
            }
        }

        // Panggil fungsi saat halaman dimuat pertama kali
        fetchData();

        // --- AUTO FETCH SETIAP 5 DETIK ---
        setInterval(() => {
            fetchData();
        }, 5000); // 5000 milidetik = 5 detik

        // --- LOGIKA SLIDER (MANUAL) ---
        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            dots.forEach((dot, index) => {
                if (index === currentIndex) {
                    dot.classList.remove('bg-blue-900/30', 'hover:bg-blue-900/50');
                    dot.classList.add('bg-blue-900');
                } else {
                    dot.classList.add('bg-blue-900/30', 'hover:bg-blue-900/50');
                    dot.classList.remove('bg-blue-900');
                }
            });
        }

        function moveSlide(direction) {
            currentIndex = currentIndex + direction;

            if (currentIndex >= totalSlides) {
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            }

            updateSlider();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }
    </script>
</body>

</html>
