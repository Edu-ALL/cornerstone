<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWARD - THECORNERSTONE</title>
    <link rel="shortcut icon" href="img/Logo square.webp" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'monospace'],
                        body: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brandBlue: '#0f4c81',
                        skyLight: '#e0f2fe',
                        gold: '#d4af37',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
        }

        .slide-container {
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* Efek reveal nama pemenang */
        @keyframes revealWinner {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(8px);
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) scale(1.02);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .winner-text {
            animation: revealWinner 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Progress bar di bawah dot navigasi */
        .auto-progress {
            height: 3px;
            background: linear-gradient(to right, #1e3a8a, #3b82f6);
            border-radius: 999px;
            animation: progressFill 6s linear forwards;
        }

        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Pause icon pada progress bar */
        .auto-progress.paused {
            animation-play-state: paused;
        }
    </style>
</head>

<body class="h-screen w-screen relative text-slate-800">
    <img src="img/BEST CATEGORY BACKGROUND.png" class="w-full h-full object-cover absolute left-0 top-0 z-0">

    <header
        class="absolute top-0 left-0 w-full p-8 flex justify-between items-center z-20 uppercase tracking-widest font-bold text-sm md:text-base text-slate-700 -mt-5">
        <div>
            <img src="img/LOGO/Logo EduALL 2026@4x.png" alt="EduALL" class="w-[120px]">
        </div>
        <div>
            <img src="img/LOGO/GKL15_Yayasan_Indonesia_Mengajar.png" alt="Indonesia Mengajar" class="w-[200px]">
        </div>
    </header>

    <main class="relative z-10 h-full w-full overflow-hidden flex flex-col justify-center items-center">
        <div id="slider-track" class="slide-container flex h-full w-full mt-[8%]">

            <!-- SLIDE 1 -->
            <div class="w-full h-full flex-shrink-0 flex flex-col justify-start items-center text-center px-4">
                <h1 class="text-2xl md:text-3xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp; E</span>
                    <br>CORNERSTONE
                </h1>
                <h2 class="text-3xl md:text-6xl font-bold mt-4 text-[#191265] mb-[5%] leading-tight tracking-tight uppercase">
                    best opening <br> speaker
                </h2>
                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl uppercase text-slate-900" id="bestOpening"></h1>
                </div>
            </div>

            <!-- SLIDE 2 -->
            <div class="w-full h-full flex-shrink-0 flex flex-col justify-start items-center text-center px-4 opacity-90">
                <h1 class="text-2xl md:text-3xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp; E</span>
                    <br>CORNERSTONE
                </h1>
                <h2 class="text-3xl md:text-6xl font-bold mt-4 text-[#191265] mb-[5%] leading-tight tracking-tight uppercase">
                    best panel <br> speaker
                </h2>
                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl uppercase text-slate-900" id="bestPanel"></h1>
                </div>
            </div>

            <!-- SLIDE 3 -->
            <div class="w-full h-full flex-shrink-0 flex flex-col justify-start items-center text-center px-4 opacity-90">
                <h1 class="text-2xl md:text-3xl font-bold text-dark mb-2 md:mb-0" style="background: linear-gradient(to right, #000000, #1e3a8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    <span class="font-extralight md:text-2xl text-xl">T &nbsp; &nbsp; &nbsp; H &nbsp; &nbsp; &nbsp; E</span>
                    <br>CORNERSTONE
                </h1>
                <h2 class="text-3xl md:text-6xl font-bold mt-4 text-[#191265] mb-[5%] leading-tight tracking-tight uppercase">
                    best project <br> exhibitor
                </h2>
                <div class="flex items-center justify-center w-full max-w-4xl gap-4 md:gap-8">
                    <h1 class="text-2xl font-bold md:text-5xl lg:text-8xl uppercase text-slate-900" id="bestProject"></h1>
                </div>
            </div>

        </div>
    </main>

    <!-- Navigasi -->
    <div class="absolute bottom-10 left-0 w-full flex flex-col items-center gap-2 z-30">

        <!-- Progress bar auto-slide -->
        <div class="w-48 h-[3px] rounded-full bg-white/30 overflow-hidden" id="progress-wrapper">
            <div class="auto-progress" id="progress-bar"></div>
        </div>

        <div class="flex justify-center items-center gap-6">
            <button onclick="manualMove(-1)"
                class="p-3 rounded-full bg-white/50 hover:bg-white hover:shadow-lg transition-all text-blue-900 backdrop-blur-sm group">
                <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>

            <div class="flex gap-2">
                <button onclick="manualGoTo(0)" class="dot w-3 h-3 rounded-full bg-blue-900 transition-all duration-300"></button>
                <button onclick="manualGoTo(1)" class="dot w-3 h-3 rounded-full bg-blue-900/30 hover:bg-blue-900/50 transition-all duration-300"></button>
                <button onclick="manualGoTo(2)" class="dot w-3 h-3 rounded-full bg-blue-900/30 hover:bg-blue-900/50 transition-all duration-300"></button>
            </div>

            <button onclick="manualMove(1)"
                class="p-3 rounded-full bg-white/50 hover:bg-white hover:shadow-lg transition-all text-blue-900 backdrop-blur-sm group">
                <svg class="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGBZsYTIimT9zPc-9D5fP__it-jwo5f8gNCPfBaGt6d0y1MpBYHnSN_TpN1_jZzaDe/exec?type=award';

        let currentIndex = 0;
        const totalSlides = 3;
        const AUTO_SLIDE_INTERVAL = 6000; // 6 detik per slide
        const track = document.getElementById('slider-track');
        const dots = document.querySelectorAll('.dot');
        const progressBar = document.getElementById('progress-bar');

        let autoSlideTimer = null;

        // --- PROGRESS BAR ---
        function resetProgress() {
            // Hapus & buat ulang elemen supaya animasi restart dari awal
            const wrapper = document.getElementById('progress-wrapper');
            const oldBar = document.getElementById('progress-bar');
            const newBar = document.createElement('div');
            newBar.id = 'progress-bar';
            newBar.className = 'auto-progress';
            wrapper.replaceChild(newBar, oldBar);
        }

        // --- LOGIKA SLIDER ---
        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            dots.forEach((dot, index) => {
                if (index === currentIndex) {
                    dot.classList.remove('bg-blue-900/30', 'hover:bg-blue-900/50');
                    dot.classList.add('bg-blue-900');
                } else {
                    dot.classList.add('bg-blue-900/30', 'hover:bg-blue-900/50');
                    dot.classList.remove('bg-blue-900');
                }
            });
        }

        function moveSlide(direction) {
            currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
        }

        // --- AUTO SLIDE ---
        function startAutoSlide() {
            stopAutoSlide();
            resetProgress();

            autoSlideTimer = setInterval(() => {
                moveSlide(1);
                resetProgress();
            }, AUTO_SLIDE_INTERVAL);
        }

        function stopAutoSlide() {
            if (autoSlideTimer) {
                clearInterval(autoSlideTimer);
                autoSlideTimer = null;
            }
        }

        // --- MANUAL NAVIGASI (pause auto-slide sementara, lalu resume) ---
        function manualMove(direction) {
            moveSlide(direction);
            startAutoSlide(); // restart timer & progress dari awal
        }

        function manualGoTo(index) {
            goToSlide(index);
            startAutoSlide(); // restart timer & progress dari awal
        }

        // --- FETCH DATA ---
        async function fetchData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();

                const ids = ['bestOpening', 'bestPanel', 'bestProject'];
                const keys = ['bestOpening', 'bestPanel', 'bestProject'];

                ids.forEach((id, i) => {
                    const el = document.getElementById(id);
                    const newValue = data[keys[i]];

                    // Hanya update jika value berubah
                    if (newValue && el.innerText !== newValue) {
                        el.innerText = newValue;
                        el.classList.remove('winner-text');
                        // Force reflow supaya animasi bisa replay
                        void el.offsetWidth;
                        el.classList.add('winner-text');
                    }
                });

                // console.log("Data diperbarui:", data);
            } catch (error) {
                console.error("Gagal mengambil data:", error);
            }
        }

        // --- INIT ---
        fetchData();
        startAutoSlide();

        // Auto-fetch data setiap 5 detik
        setInterval(fetchData, 5000);
    </script>
</body>

</html>
